<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLO 01: SESIÓN DE REPASO</title>
    <style>
        :root {
            --bg: #000;
            --panel: #050505;
            --accent: #ffffff;
            --safe: #00d4ff;
            /* Cian - Estabilidad */
            --warning: #ff9800;
            /* Naranja - Degradación */
            --critical: #ff0000;
            /* Rojo - Fallo */
            --text: #fff;
            --dim: #333;
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Escáner Biométrico */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 212, 255, 0.05);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        header {
            padding: 15px 25px;
            background: var(--panel);
            border-bottom: 1px solid var(--dim);

        }

        .sys-info {
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .session-timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--safe);
        }

        #ia-console {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            background: #080808;
            border-bottom: 1px solid #111;
            letter-spacing: 1px;
            padding: 1rem;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            /* Reducido para mejor escala en móvil */
            text-align: center;
            /* El borde ahora vive aquí */
            border: 8px solid var(--dim);
            margin: 1rem;
            transition: border-color 0.4s ease;
            overflow-y: auto;
            /* Permite scroll interno si el contenido crece */
        }

        #prompt {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1rem;
            max-width: 850px;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 1rem;
            cursor: pointer;
            /*font-size: 0.9rem;*/
            /*transition: 0.1s;*/
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--text);
            color: #000;
        }

        /* Barra de Estabilidad de Núcleo */
        .stability-footer {
            height: 8px;
            background: #111;
            width: 100%;
            position: relative;
        }

        #stability-bar {
            height: 100%;
            background: var(--safe);
            width: 100%;
            transition: width 0.3s linear;
        }

        /* Estados de Borde Dinámicos */
        .state-warning {
            border-color: var(--warning);
        }

        .state-critical {
            border-color: var(--critical);
        }

        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-box {
            width: 100%;
            max-width: 450px;
            background: #050505;
            border: 1px solid var(--dim);
        }

        .result-header {
            background: #111;
            padding: 10px;
            font-size: 0.6rem;
            color: var(--dim);
            border-bottom: 1px solid var(--dim);
            text-align: center;
            letter-spacing: 2px;
        }

        .result-content {
            padding: 30px;
            text-align: center;
        }

        #res-status {
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .res-data {
            text-align: left;
            font-size: 0.7rem;
            background: #080808;
            padding: 15px;
            border: 1px solid #111;
            margin-bottom: 20px;
            line-height: 2;
        }

        .res-msg-text {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 25px;
        }

        .btn-terminal {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* Colores dinámicos basados en la clase del body */
        /*.state-stable #status-text { color: var(--safe); }
.state-warning #status-text { color: var(--warning); }
.state-critical #status-text { color: var(--critical); }*/

        /* Estados de Borde Dinámicos aplicados al main */
        .main-display.state-warning {
            border-color: var(--warning);
        }

        .main-display.state-critical {
            border-color: var(--critical);
        }

        .main-display.state-stable {
            border-color: var(--dim);
        }

        /* Opcional: Que la barra de vigencia también cambie de color automáticamente */
        .state-stable #stability-bar {
            background: var(--safe);
        }

        .state-warning #stability-bar {
            background: var(--warning);
        }

        .state-critical #stability-bar {
            background: var(--critical);
        }
    </style>
</head>

<body>

    <header>
        <div class="sys-info">SYS_9001 // REPASO</div>
        <div id="timer" class="session-timer">25:00</div>
        <div id="status-text" style="font-size: 0.6rem;">ESTADO: ESTABLE</div>
    </header>

    <div id="ia-console">SISTEMA INICIADO. MANTENGA FLUJO DE RESPUESTA CONSTANTE.</div>
    <div class="stability-footer">
        <div id="stability-bar"></div>
    </div>
    <main class="main-display">
        <div id="prompt">INICIALIZANDO UNIDAD...</div>
        <div id="options-grid" class="options"></div>
    </main>


    <div id="result-overlay">
        <div class="result-box">
            <div class="result-header">REPORTE_DE_SINCRONIZACIÓN</div>
            <div class="result-content">
                <h1 id="res-status">SESIÓN COMPLETADA</h1>
                <div class="res-data">
                    <p>USUARIO: <span id="res-core">9001_MENDOZA</span></p>
                    <p>EFICIENCIA DE SESIÓN: <span id="res-efficiency">0%</span></p>
                    <p>ESTADO FINAL: <span id="res-sync">DESCONECTADO</span></p>
                </div>
                <div id="res-msg" class="res-msg-text">
                    Los datos han sido persistidos en la memoria local.
                </div>
                <button class="btn-final" onclick="Protocolo.finalizarYEnviar()">RETORNAR AL NODO CENTRAL</button>
            </div>
        </div>
    </div>

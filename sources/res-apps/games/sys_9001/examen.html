<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA 9001 - JUICIO FINAL</title>
    <style>
        :root {
            --bg: #000;
            --panel: #050505;
            --accent: #ffffff;
            --critical: #ff0000;
            --text: #fff;
            --dim: #333;
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid var(--dim);
            padding: 1rem;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }


        /* Cuando el tiempo es menor a 4, el borde se vuelve rojo */
        body.state-critical {
            border-color: var(--critical) !important;
            /* Opcional: un leve resplandor para aumentar la presión */
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.1);
        }

        /* Efecto Escáner */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        header {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-panel {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid var(--dim);
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }

        .timer-container {
            width: 100%;
            height: 4px;
            background: #111;
        }

        #timer-bar {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 1s linear;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            /* Reducido para mejor escala en móvil */
            text-align: center;
            /* El borde ahora vive aquí */
            border: 8px solid var(--dim);
            margin: 1rem;
            transition: border-color 0.4s ease;
            overflow-y: auto;
            /* Permite scroll interno si el contenido crece */
        }

        #ia-status {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        #question-text {
            font-size: 1.6rem;
            max-width: 850px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 750px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 22px;
            font-size: 0.9rem;
            /*transition: 0.1s;*/
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--text);
            color: #000;
        }

        /* --- ESTILOS DEL RESULTADO (EL CARTEL QUE FALTA) --- */
        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-box {
            width: 100%;
            max-width: 500px;
            background: #050505;
            border: 1px solid var(--dim);
        }

        .result-header {
            background: #111;
            padding: 10px;
            font-size: 0.6rem;
            color: var(--dim);
            border-bottom: 1px solid var(--dim);
            text-align: center;
            letter-spacing: 2px;
        }

        .result-content {
            padding: 30px;
            text-align: center;
        }

        .res-data {
            text-align: left;
            font-size: 0.75rem;
            background: #080808;
            padding: 15px;
            border: 1px solid #111;
            margin: 20px 0;
            line-height: 1.8;
        }

        .text-success {
            color: #00ff00;
        }

        .text-fail {
            color: #ff0000;
        }

        .btn-terminal {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }

        /* Estados de Borde Dinámicos aplicados al main */
        .main-display.state-warning {
            border-color: var(--warning);
        }

        .main-display.state-critical {
            border-color: var(--critical);
        }

        .main-display.state-stable {
            border-color: var(--dim);
        }

        /* Opcional: Que la barra de vigencia también cambie de color automáticamente */
        .state-stable #stability-bar {
            background: var(--safe);
        }

        .state-warning #stability-bar {
            background: var(--warning);
        }

        .state-critical #stability-bar {
            background: var(--critical);
        }

        /* Efecto Shake (Vibración de Error) */
        .fx-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        body {
            padding: 0;
            /* Eliminamos el padding para ganar espacio */
            border-width: 4px;
            /* Borde más fino para pantallas pequeñas */
        }

        header {
            padding: 10px 20px;
            font-size: 0.65rem;
            background: #000;
            border-bottom: 1px solid var(--dim);
        }

        /* HUD MONITOREO COMPACTO */
        .hud-monitor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #050505;
            border-bottom: 1px solid #111;
            min-height: 40px;
        }

        .hud-stats {
            display: flex;
            gap: 20px;
        }

        .hud-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .hud-label {
            font-size: 0.5rem;
            color: var(--dim);
        }

        .hud-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }

        #ia-status {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
        }

        /* ÁREA DE JUEGO ADAPTABLE */
        .main-display {
            flex: 1;
            padding: 20px;
            /* Reducido de 40px */
            justify-content: flex-start;
            /* Empieza desde arriba en móviles */
            margin-top: 20px;
        }

        #question-text {
            font-size: 1.2rem;
            /* Más pequeño para que quepa todo */
            margin-bottom: 25px;
            line-height: 1.3;
        }

        /* GRID RESPONSIVO */
        .options-grid {
            gap: 10px;
        }

        .btn {
            padding: 15px;
            /* Reducido para que quepan 4 botones en pantalla */
            font-size: 0.8rem;
        }

        /* MEDIA QUERIES PARA MÓVIL EXTREMO */
        @media (max-width: 480px) {
            body {
                border-width: 2px;
            }

            header {
                padding: 8px 12px;
            }

            .hud-monitor {
                padding: 5px 12px;
            }

            .hud-value {
                font-size: 1rem;
            }

            #question-text {
                font-size: 1rem;
            }

            .btn {
                padding: 12px;
                font-size: 0.75rem;
            }

            .hud-item:first-child {
                display: none;
            }

            /* Ocultamos Puntos en pantallas mini si es necesario */
        }
    </style>
    </style>
</head>
